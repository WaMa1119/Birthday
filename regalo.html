<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Tu Regalo</title>

  <link
    rel="stylesheet"
    href="regalo.css"
  />
</head>

<body>

  <!-- VIDEO INTRO -->

  <section
    id="videoSection"
    class="video-section"
  >

    <video
      id="introVideo"
      class="intro-video"
      autoplay
      playsinline
      controls
    >
      <source
        src="humbe.mp4"
        type="video/mp4"
      />
    </video>

  </section>

  <!-- REGALO -->

  <section
    id="giftSection"
    class="gift-section"
  >

    <h1 class="gift-title">
      TU REGALO ✨
    </h1>

    <p class="gift-subtitle">
      una noche para recordar
    </p>

    <div class="tickets">

      <!-- Ticket 1 -->

      <div class="ticket">

        <img
          src="humbe.jpg"
          class="artist-image"
          alt="Humbe"
        />

        <div class="ticket-content">

          <h2>
            HUMBE
          </h2>

          <p>
            Entrada 1
          </p>
          <p>
            18-10-2026
          </p>

          <img
            src="qr.png"
            class="qr"
            alt="QR"
          />

        </div>

      </div>

      <!-- Ticket 2 -->

      <div class="ticket">

        <img
          src="humbe.jpg"
          class="artist-image"
          alt="Humbe"
        />

        <div class="ticket-content">

          <h2>
            HUMBE
          </h2>

          <p>
            Entrada 2
          </p>
          <p>
            18-10-2026
          </p>

          <img
            src="qr.png"
            class="qr"
            alt="QR"
          />

        </div>

      </div>

    </div>

  </section>

  <script src="regalo.js"></script>

</body>

</html>
