<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>FlappyWalt.sys</title>

  <link rel="stylesheet" href="flappy.css" />
</head>

<body>

  <main class="game-container">

    <!-- TOPBAR -->

    <div class="topbar">

      <a href="./../../games.html" class="back-link">
        ← VOLVER
      </a>

      <div class="score-box">
        SCORE:
        <span id="score">0</span>
      </div>

    </div>

    <!-- GAME -->

    <section id="gameArea" class="game-area">

      <!-- PLAYER -->

      <img
        id="player"
        class="player"
        src="walter.png"
        alt="Walt"
      />

      <!-- START -->

      <div id="startText" class="start-text">
        TOCA PARA VOLAR 💖
      </div>

    </section>

  </main>

  <script src="flappy.js"></script>

</body>

</html>
